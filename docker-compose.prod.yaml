version: '3.8'

services:
  app:
    container_name: flashcards-container
    restart: always
    build:
      context: .
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_VAPID_KEY: ${NEXT_PUBLIC_VAPID_KEY}
    env_file:
      - packages/config/.env
    environment:
      - NODE_ENV=production
      - NODE_OPTIONS=--openssl-legacy-provider
    ports:
      - 4000:4000
