version: '3.8'

services:
  app:
    container_name: flashcards-container
    restart: always
    build:
      context: .
      dockerfile: Dockerfile.prod
    env_file:
      - packages/config/.env.server
    environment:
      - NODE_ENV=production
      - NODE_OPTIONS=--openssl-legacy-provider
    ports:
      - 4000:4000
