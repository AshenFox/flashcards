services:
  mongo:
    image: mongo:8.2
    container_name: mongo
    restart: unless-stopped
    ports:
      - "27017:27017"               # exposed so native `npm run dev` can reach it
    env_file:
      - packages/config/.env.server
    volumes:
      - ./infra/data:/data/db
      - ./infra/backups:/backups
      - ./infra/mongo/init.js:/docker-entrypoint-initdb.d/init.js:ro
